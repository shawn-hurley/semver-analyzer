# ── CSS variable renames (v5 CSS custom property → v6 CSS custom property) ──
#
# Generated from token_mappings + actual v5/v6 package data.
# These handle inline CSS variable string references (e.g., in style props)
# that the JS-level token_mappings cannot reach.
#
# The CssVariablePrefix fix strategy only swaps the version prefix
# (--pf-v5- → --pf-v6-) but global tokens were entirely restructured in v6
# (e.g., --pf-v5-global--BackgroundColor--100 → --pf-t--global--background--color--100).
# These explicit mappings ensure the full CSS variable name is replaced.
#
# Rule IDs use "semver-consumer-css-rename-var-" prefix so they sort
# alphabetically before the broad "semver-consumer-css-stale-var-" prefix
# swap rule, ensuring specific renames apply first.
