# Supplemental patterns for PatternFly v5 → v6 migration.
#
# Only entries that CANNOT be auto-detected from the AST or inferred
# by the LLM rename inference phase belong here.
#
# The analyzer auto-generates rules for: prop removals, type changes,
# component removals, composition restructuring, child component
# absorption, and behavioral changes.
#
# The LLM rename inference phase auto-discovers: CSS logical property
# renames (PaddingTop → PaddingBlockStart), interface renames
# (TextProps → ContentProps), and typo corrections.
#
# What remains here: domain-specific knowledge that cannot be inferred
# from the AST diff or LLM pattern matching.
#
# Usage:
#   semver-analyzer konveyor \
#     --from-report report.json \
#     --output-dir ./rules \
#     --rename-patterns hack/integration/patternfly-rename-patterns.yaml

rename_patterns: []

# ── Prop renames (P3-A) ──────────────────────────────────────────────
# Props removed from component interfaces where the replacement is a
# React builtin (not a declared TypeScript prop).
prop_renames:
  - old_prop: innerRef
    new_prop: ref
    components: "^(MenuToggle|Table|Td|Th|Tr|TextInputGroupMain)$"
    package: "@patternfly/react-core"
    description: "innerRef replaced with standard React ref — use the 'ref' prop instead"

# ── Value reviews (P4-C) ─────────────────────────────────────────────
# Prop values that are technically still valid but may need review.
value_reviews:
  - prop: variant
    component: "^MenuToggle$"
    value: "^plain$"
    package: "@patternfly/react-core"
    category: potential
    description: "MenuToggle: variant='plain' may need updating — keep for icon-only toggles, use 'plainText' for text toggles, or 'typeahead' for typeahead inputs"
    effort: 1

# ── Component warnings ────────────────────────────────────────────────
# Components whose internal DOM/CSS rendering changed without an API
# surface change. These emit JSX_COMPONENT rules so consumers are
# alerted at the exact usage site.
component_warnings:
  - pattern: "^TextArea$"
    package: "@patternfly/react-core"
    category: potential
    description: "TextArea: wrapper now has pf-v6-c-form-control__textarea modifier class — update CSS selectors targeting TextArea wrappers"
    effort: 1

  - pattern: "^ListItem$"
    package: "@patternfly/react-core"
    category: potential
    description: "ListItem: children are now wrapped in a <span> element — update CSS selectors or test snapshots that depend on ListItem DOM structure"
    effort: 1

# ── Missing imports (P5) ─────────────────────────────────────────────
# Co-requisite imports: flag when pattern A is present but pattern B is absent.
missing_imports:
  - has_pattern: "@patternfly/react-core/dist/styles/base\\.css"
    missing_pattern: "@patternfly/patternfly/utilities/_index\\.css"
    file_pattern: "\\.(ts|tsx|js|jsx)$"
    category: mandatory
    description: "PF v6 requires separate utilities CSS import — add import '@patternfly/patternfly/utilities/_index.css' alongside your base.css import"
    effort: 1
