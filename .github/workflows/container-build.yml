name: Container Build

on:
  push:
    branches: [main]
    paths: ['build/**']
  pull_request:
    branches: [main]
    paths: ['build/**']

jobs:
  build:
    name: Build Container Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build container image
        working-directory: build
        run: podman build --format docker -t localhost/patternfly-tools:latest -f Containerfile .
